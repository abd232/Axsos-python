<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Purchasese</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="d-flex justify-content-end align-items-center w-75 p-3 m-auto">
      <a href="/logout" class="btn btn-link text-primary"> Log out </a>
    </div>
    <div class="d-flex justify-content-end align-items-center w-75 p-3 m-auto">
      <a href="/cars" class="btn btn-link text-primary"> << Back to Deals</a>
    </div>
    <div
      class="d-flex justify-content-start align-items-center w-75 p-3 m-auto"
    >
      <h2>{{first_name}}'s Purchases</h2>
      <table class="table table-striped table-bordered w-75 m-auto">
        <tr>
          <th>Year</th>
          <th>Model</th>
          <th>Seller</th>
          <th>Contact</th>
          <th>action</th>
        </tr>
        {% if not cars %}
        <tr>
          <td colspan="5" class="text-center">
            no cars posted yet <a href="cars/new">start a new post</a>
          </td>
        </tr>
        {% else %} {% for car in cars %}
        <tr>
          <td>{{car.year}}</td>
          <td>{{car.model}}</td>
          <td>{{car.dealer}}</td>
          <td>{{cat.seller_contact}}</td>
          <td><a href="/cars/{{car.car_id}}/unbuy">Cancel</a></td>
        </tr>
      </table>
    </div>
  </body>
</html>
