<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      class="d-flex justify-content-between align-items-center w-75 p-3 m-auto"
    >
      <h1>Welcome to Sovage Vintage, {{ request.session.first_name }}</h1>
      <a href="/logout" class="btn btn-link text-primary"> Log out </a>
    </div>
    <div class="d-flex justify-content-between w-50 p-3 m-auto">
      <div>
        {% for key,value in errors.items %}
        <p class="text-danger mb-2">{{ value }}</p>
        {% endfor %}
      </div>
      <a href="cars/new">Cancel</a>
    </div>
    <form class="w-75 m-auto" action="/cars/edit/{{car_id}}" method="post">
      {% csrf_token %}
      <div class="row mb-3">
        <label for="price" class="col-md-3 text-end">Price:</label>
        <input
          id="price"
          type="number"
          name="price"
          class="col-md-3"
          value="{{car.price}}"
        />
      </div>
      <div class="row mb-3">
        <label for="model" class="col-md-3 text-end">Model:</label>
        <input
          id="model"
          type="text"
          name="model"
          class="col-md-6"
          value="{{car.model}}"
        />
      </div>
      <div class="row mb-3">
        <label for="make" class="col-md-3 text-end">Make:</label>
        <input
          id="make"
          type="text"
          name="make"
          class="col-md-6"
          value="{{car.make}}"
        />
      </div>
      <div class="row mb-3">
        <label for="year" class="col-md-3 text-end">Year:</label>
        <input
          id="year"
          type="number"
          name="year"
          class="col-md-3"
          value="{{car.year}}"
        />
      </div>
      <div class="row mb-3">
        <label for="seller_contact" class="col-md-3 text-end"
          >Seller Contact:</label
        >
        <input
          id="seller_contact"
          type="text"
          name="seller_contact"
          class="col-md-6"
          value="{{car.sellect_contact}}"
        />
      </div>
      <div class="row mb-3">
        <label for="description" class="col-md-3 text-end">Description:</label>
        <textarea
          id="description"
          type="text"
          name="description"
          class="col-md-6"
          rows="6"
        >
        {{car.description}}
        </textarea>
      </div>
      <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-light">Submit</button>
        <div class="col-md-3">&nbsp;</div>
      </div>
    </form>
  </body>
</html>
