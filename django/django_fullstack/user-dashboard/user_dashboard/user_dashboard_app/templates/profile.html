<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Information</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="align-items-center m-auto mt-2 w-75">
      <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex gap-4">
          <button class="btn" onclick="home()">Test App</button>
          <button class="btn" onclick="dashboard()">Dashboard</button>
          <button class="btn" onclick="profile()">Profile</button>
        </div>
        <button class="btn" onclick="logout()">Log off</button>
      </div>
    </header>
    <hr class="m-1" />
    <main class="m-auto mt-2 w-75">
      <h1 class="mt-3 mb-2">{{first_name}} {{last_name}}</h1>
      <table class="mb-2 mt-2">
        <tr>
          <td>Registerd at:</td>
          <td>{{created_at}}</td>
        </tr>
        <tr>
          <td>User ID:</td>
          <td>#{{user_id}}</td>
        </tr>
        <tr>
          <td>Email address:</td>
          <td>{{email}}</td>
        </tr>
        <tr>
          <td>Description:</td>
          <td>{{description}}</td>
        </tr>
      </table>
      <div>
        <form action="/massage/{{user_id}}" method="post">
          {% csrf_token %}
          <label for="content">
            <strong>Leave a massage for {{first_name}}</strong>
          </label>
          <textarea
            name="content"
            id="content"
            rows="3"
            class="w-100"
          ></textarea>
          <input type="submit" value="Post" class="btn btn-primary mt-2" />
        </form>
      </div>
      {% for massage in massages %}
      <div>
        <form action="/massage/{{user_id}}" method="post">
          {% csrf_token %}
          <label for="content">
            <strong
              >{{massage.massage_from_user.first_name}}
              {{massage.massage_from_user.last_name}}</strong
            >
          </label>
          <textarea name="content" id="content" rows="3" class="w-100" readonly>
            {{massage.content}}
          </textarea>
          <input type="submit" value="Post" class="btn btn-primary mt-2" />
        </form>
      </div>
      {% endfor %}
    </main>
  </body>
  <script>
    function logout() {
      window.location.href = "/logout";
    }

    function dashboard() {
      window.location.href = "/dashboard";
    }

    function home() {
      window.location.href = "/";
    }

    function profile() {
      window.location.href = "/users/show/{{request.session.user_id}}";
    }
  </script>
</html>
